# OpenAI - Direct API access
# First-party provider: auto-exposes all global models

id = "openai"
name = "OpenAI"
kind = "provider"
description = "OpenAI direct API"
category = "hosted"
baseURL = "https://api.openai.com/v1"
defaultModel = "gpt-4o"
isFirstParty = true
apiKeyRequired = true
credentialEnvVars = ["OPENAI_API_KEY"]
costCurrency = "USD"

[setup]
requiresAuth = true
authMode = "api-key"

[transportConfig]
kind = "openai-compatible"

[catalog]
source = "hybrid"
discoveryCacheTtl = "1h"
discoveryRefreshMode = "manual"
allowManualRefresh = true
discovery.kind = "openai-compatible"
discovery.requiresAuth = true
discovery.path = "/models"

[[catalog.models]]
globalModelId = "gpt-4o"
cost.inputPerMillion = 2.50
cost.outputPerMillion = 10.00

[[catalog.models]]
globalModelId = "gpt-4o-mini"
cost.inputPerMillion = 0.15
cost.outputPerMillion = 0.60

[validation]
kind = "credential-env"
missingCredentialMessage = "An OpenAI API key is required."

[preset]
id = "openai"
description = "OpenAI direct API"
fallbackBaseUrl = "https://api.openai.com/v1"
fallbackModel = "gpt-4o"
